services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: slackclone
      POSTGRES_USER: slack
      POSTGRES_PASSWORD: slack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slack -d slackclone"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/slackclone
      SPRING_DATASOURCE_USERNAME: slack
      SPRING_DATASOURCE_PASSWORD: slack
      APP_MEDIA_DIR: /data/media
      APP_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - media:/data/media
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
